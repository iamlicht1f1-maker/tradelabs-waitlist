<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradeLabs — Join the waitlist</title>
<meta name="description" content="TradeLabs — crypto, made honest. Join the waitlist for early access." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F4F4F6;
    --surface: #FFFFFF;
    --elevated: #FAFAFB;
    --silver-1: #E8E8EC;
    --silver-2: #D1D1D6;
    --silver-3: #A1A1AA;
    --text: #18181B;
    --muted: #71717A;
    --accent: #111111;
    --success: #22C55E;
    --danger: #EF4444;
    --info: #3B82F6;
  }
  * { box-sizing: border-box; }
  html { min-height: 100%; background: var(--canvas); }
  body {
    min-height: 100vh;
    margin: 0;
    padding: 32px 20px;
    display: grid;
    place-items: center;
    color: var(--text);
    background: var(--canvas);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  button, input { font: inherit; }
  .stage { width: min(100%, 520px); text-align: center; }
  .mark { width: 72px; height: 72px; }
  .mark path {
    fill: none;
    stroke: var(--text);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  h1 {
    margin: 24px 0 0;
    font-family: "Instrument Serif", Georgia, serif;
    font-size: clamp(48px, 8vw, 68px);
    font-weight: 400;
    letter-spacing: -0.04em;
    line-height: 0.95;
  }
  .tagline { margin: 14px 0 0; color: var(--muted); font-size: 16px; line-height: 1.5; }
  .form { margin-top: 38px; text-align: left; }
  .name-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .control { display: grid; gap: 8px; }
  .control + .control, .name-grid + .control { margin-top: 16px; }
  label { color: var(--text); font-size: 13px; font-weight: 600; }
  input {
    width: 100%;
    min-height: 48px;
    padding: 0 14px;
    border: 1px solid var(--silver-2);
    border-radius: 8px;
    outline: none;
    color: var(--text);
    background: var(--surface);
    transition: border-color 160ms ease, box-shadow 160ms ease;
  }
  input::placeholder { color: var(--silver-3); }
  input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(17,17,17,.08); }
  .submit {
    width: 100%;
    min-height: 48px;
    margin-top: 20px;
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--surface);
    background: var(--accent);
    font-weight: 600;
    cursor: pointer;
    transition: opacity 160ms ease;
  }
  .submit:hover { opacity: .9; }
  .submit:disabled { cursor: wait; opacity: .55; }
  .micro { margin: 14px 0 0; color: var(--muted); font-size: 13px; line-height: 1.5; text-align: center; }
  .micro.error { color: var(--danger); }
  .honeypot, .submission-frame { position: absolute; width: 1px; height: 1px; left: -9999px; border: 0; }
  .result { display: none; margin-top: 38px; }
  .result.visible { display: block; }
  .result-mark {
    width: 52px;
    height: 52px;
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    border: 1px solid var(--text);
    border-radius: 50%;
  }
  .result-mark svg { width: 24px; height: 24px; fill: none; stroke: var(--text); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
  .result h2 { margin: 0; font-family: "Instrument Serif", Georgia, serif; font-size: 34px; font-weight: 400; letter-spacing: -.025em; }
  .result p { margin: 10px auto 0; max-width: 430px; color: var(--muted); font-size: 14px; line-height: 1.6; }
  @media (max-width: 520px) {
    body { padding: 28px 18px; align-items: start; }
    .stage { padding-top: 24px; }
    .name-grid { grid-template-columns: 1fr; gap: 16px; }
    .name-grid .control + .control { margin-top: 0; }
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; } }
</style>
</head>
<body>
  <main class="stage">
    <svg class="mark" viewBox="0 0 120 120" aria-hidden="true"><path d="M60 28 87 44v32L60 92 33 76V44Z"/><path d="M40 63h11l6-14 7 30 6-16h10"/></svg>
    <h1>TradeLabs</h1>
    <p class="tagline">Crypto, made honest.</p>

    <form class="form" id="waitlist-form" action="https://buttondown.com/api/emails/embed-subscribe/tradelabs" method="post" target="buttondown-submit-frame" novalidate>
      <div class="name-grid">
        <div class="control">
          <label for="first_name">First name</label>
          <input id="first_name" name="metadata__first_name" type="text" autocomplete="given-name" placeholder="Alex" maxlength="80" required />
        </div>
        <div class="control">
          <label for="last_name">Last name</label>
          <input id="last_name" name="metadata__last_name" type="text" autocomplete="family-name" placeholder="Morgan" maxlength="80" required />
        </div>
      </div>
      <div class="control">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" maxlength="254" required />
      </div>
      <input class="honeypot" name="company" type="text" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <input type="hidden" name="embed" value="1" />
      <button class="submit" id="submit-button" type="submit">Join the waitlist</button>
      <p class="micro" id="form-message">Be among the first 100. No spam—just important TradeLabs updates.</p>
    </form>
    <iframe class="submission-frame" id="submission-frame" name="buttondown-submit-frame" title="Signup response" aria-hidden="true"></iframe>

    <section class="result" id="result" aria-live="polite">
      <div class="result-mark"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 13 4 4L19 7"/></svg></div>
      <h2 id="result-title">Check your inbox.</h2>
      <p id="result-copy">One step remains: confirm your email to reserve your early-access place.</p>
    </section>
  </main>

<script>
  const form = document.getElementById('waitlist-form');
  const firstName = document.getElementById('first_name');
  const lastName = document.getElementById('last_name');
  const email = document.getElementById('email');
  const submitButton = document.getElementById('submit-button');
  const formMessage = document.getElementById('form-message');
  const result = document.getElementById('result');
  const resultTitle = document.getElementById('result-title');
  const resultCopy = document.getElementById('result-copy');
  const submissionFrame = document.getElementById('submission-frame');
  const params = new URLSearchParams(window.location.search);
  let submissionStarted = false;

  function showResult(title, copy) {
    form.hidden = true;
    resultTitle.textContent = title;
    resultCopy.textContent = copy;
    result.classList.add('visible');
  }

  if (params.get('confirmed') === '1') {
    const name = (params.get('first_name') || '').trim();
    showResult(name ? `You’re confirmed, ${name}.` : 'You’re confirmed.', 'Your TradeLabs early-access place is reserved. We’ll email you when access opens.');
  } else if (params.get('pending') === '1') {
    showResult('Check your inbox.', 'One step remains: confirm your email to reserve your early-access place.');
  } else if (params.get('waitlisted') === '1') {
    showResult('You’re on the waitlist.', 'The first 100 places are currently reserved. We’ll contact you if another early-access place opens.');
  }

  function fail(message, field) {
    formMessage.textContent = message;
    formMessage.classList.add('error');
    field.focus();
  }

  form.addEventListener('submit', (event) => {
    const first = firstName.value.trim();
    const last = lastName.value.trim();
    const address = email.value.trim();
    if (!first) { event.preventDefault(); fail('Please enter your first name.', firstName); return; }
    if (!last) { event.preventDefault(); fail('Please enter your last name.', lastName); return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(address)) { event.preventDefault(); fail('Please enter a valid email address.', email); return; }
    formMessage.classList.remove('error');
    formMessage.textContent = 'Submitting your place…';
    submitButton.disabled = true;
    submitButton.textContent = 'Joining…';
    submissionStarted = true;
  });

  submissionFrame.addEventListener('load', () => {
    if (!submissionStarted) return;
    submissionStarted = false;
    showResult('Successfully subscribed.', 'Your signup was received. Check your inbox for the TradeLabs confirmation email.');
  });
</script>
</body>
</html>
